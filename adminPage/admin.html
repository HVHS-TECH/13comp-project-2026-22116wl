<!DOCTYPE html>

<html lang="en">
<head>
    <title>games</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="./adminStyle.css">
    
</head>

<body>
    <header class = 'flexBox'>
        <a class = "BackButton" href = "../index.html"><img src = "../Assets/Images/BackIcon.png"></a>

        <h1>Admin Settings</h1>

        <div style = "width: 70px;"></div>
    </header>
    
    <main id = "adminPage">
        <div id = "adminUserSettings" style = "display: none;">
            
            <h2></h2>
            <p id = "isAdmin">This user is an admin</p>
            <img>
            
            <div id = "adminNameChangeBox">
                <div></div>
                <input>
                <button onclick = "changeNameClicked()"><img src = "../Assets/Images/EditIcon.png"></button>
            </div>

            <button id = "delete" onclick = "deleteAccount(sessionStorage.getItem('focusedUser'))">Delete Account</button>
            <button id = "ban" onclick = "banAccount(sessionStorage.getItem('focusedUser'))">Ban User</button>
        </div>


        <div id = "adminUserList">
            <h2>Users</h2>

            <button id = "template" class = "listUser" style = "display: none !important;" onclick="focusUser(this.id)">
                <img>
                <p id = "displayName"></p>
            </button>

            <div id = "scrollingUserList">
            </div>
        </div>
    </main>

    <script type="module" src="./adminControls.mjs"></script>
</body>

</html>
