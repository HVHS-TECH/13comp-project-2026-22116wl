<!DOCTYPE html>

<html lang="en">
<head>
    <title>games</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    
</head>

<body>
    <div id = 'loginBlur'>
        <div id = "landing">
            <div style = "height: 30vh"></div>
            <h1>13 COMP Project</h1>
            <button onclick = "login()">Log in</button>
            <button onclick = "register()">Register</button>
        </div>

        <div id = "registration">
            <h2>Register Account</h2>
            
            <div id = "fields">
                <div id = "displayName">
                    <p>Display Name:</p>
                    <input>
                </div>
    
                <div id = "motherMaidenName">
                    <p>Mother's Maiden Name:</p>
                    <input>
                </div>
                
                <div id = "firstPet">
                    <p>Name of First Pet:</p>
                    <input>
                </div>
                
                <div id = "cardNumber">
                    <p>Credit Card Number:</p>
                    <input>
                </div>
                
                <div id = "expiration">
                    <p>Expiration Date:</p>
                    <input>
                </div>
                
                <div id = "CVV">
                    <p>Three Numbers on the Back:</p>
                    <input>
                </div>

                <div id = "pin">
                    <p>EFTPOS Pin Number:</p>
                    <input>
                </div>
            </div>
            
            
            <button id = 'registerAccount' onclick="createAccount()">Register Account</button>
        </div>
    </div>

    <header>
        <div id = "leftButtonSpace">
            <button id = "adminButton">
                <a href = "./adminPage/admin.html">
                    <p>Admin Settings</p>
                </a>
            </button>
        </div>
        
        <h1>13 COMP Site</h1>
        <button id='accountSettingsButton' onclick="toggleSettings()"><img src = "./Assets/Images/notLoggedIn.png"></button>
    </header>
    
    <div id = 'gamesSpace'>
        <div class = 'row'>
            <!-- Class = 'gameIcon' -->
            <!-- ID = game script name -->

            <a>
                <div id = "space_shooter" class = 'gameIcon'>
                    <img>
                    <p class = 'gameName'>Space Shooter</p>
                </div>
            </a>


            <a>
                <div id = "game_that_works" class = 'gameIcon'>
                    <img>
                    <p class = 'gameName'>Game that Works</p>
                </div>
            </a>

            <a>
                <div id = "guess_the_number" class = 'gameIcon'>
                    <img>
                    <p class = 'gameName'>Guess the Number</p>
                </div>
            </a>
        </div>
    </div>

    <div class = "AccountSettings" style = "display: none;">
        <h2>Account Settings</h2>


        <img id = "settingsPhoto">

        <p>Display Name</p>
        <div id = "nameChangeBox">
            <div></div>
            <input>
            <button onclick = "changeNameClicked()"><img src = "./Assets/Images/EditIcon.png"></button>
        </div>

        <button onclick="logOut()">Log Out</button>
        <button onclick = "deleteAccount(sessionStorage.getItem('UID'))" id = "deleteButton">Delete Account</button>
    </div>

    <script type="module" src="./main.mjs"></script>
</body>

</html>
